      <g transform="rotate(315)"><line x1="0" y1="-28" x2="0" y2="-62" stroke-width="8"/>
        <rect x="-7" y="-96" width="14" height="26" rx="7" stroke="none"/></g>
    </g>
    <text y="8" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="url(#goldGrad)">S</text>
