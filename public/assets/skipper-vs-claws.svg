    <text x="28" y="29" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">C1</text>
    <text x="56" y="22" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#aab4c8">OpenClaw</text>
