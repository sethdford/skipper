      <g transform="rotate(90)"><line x1="0" y1="-28" x2="0" y2="-62" stroke-width="8"/>
        <rect x="-7" y="-96" width="14" height="26" rx="7" stroke="none"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-28" x2="0" y2="-62" stroke-width="8"/>
        <rect x="-7" y="-96" width="14" height="26" rx="7" stroke="none"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-28" x2="0" y2="-62" stroke-width="8"/>
